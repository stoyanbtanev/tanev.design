    /* ══════════════════════════════════════════════
       SONAR ANIMATION — FIXED
       ─ Rings: centered via translate(-50%,-50%)
       ─ Sweep: element center sits at radar center
         via negative margins, rotates around its
         own center (= radar center). No offset.
    ══════════════════════════════════════════════ */
    .radar-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, .22);
      animation: radar-expand 3s ease-out infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes radar-expand {
      0% {
        width: 0;
        height: 0;
        opacity: .85;
      }

      100% {
        width: 340px;
        height: 340px;
        opacity: 0;
      }
    }

    .radar-ring:nth-child(2) {
      animation-delay: 1s;
    }

    .radar-ring:nth-child(3) {
      animation-delay: 2s;
    }

    .sonar-sweep {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 160px;
      height: 160px;
      margin: -80px 0 0 -80px;
      /* pull element so its center = radar center */
      transform-origin: 50% 50%;
      /* rotate around element center = radar center */
      animation: sweep 3s linear infinite;
      background: conic-gradient(from 0deg at 50% 50%,
          rgba(0, 212, 255, 0) 300deg,
          rgba(0, 212, 255, .55) 360deg);
      border-radius: 50%;
    }

    @keyframes sweep {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* ── Scan line ── */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00D4FF, transparent);
      animation: scan 1.6s linear infinite;
      box-shadow: 0 0 8px #00D4FF;
    }

    @keyframes scan {
      from {
        top: 0;
        opacity: 1;
      }

      to {
        top: 100%;
        opacity: .2;
      }
    }

    /* ── Progress bars ── */
    .bar-inner {

    /* ── Floating gradient orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0;

    html:not(.dark) .orb-1 {

    }

    }

    @keyframes orbDrift {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(60px, -40px) scale(1.1);
      }

      50% {
        transform: translate(-30px, 50px) scale(0.95);
      }

      75% {
        transform: translate(40px, 20px) scale(1.05);
      }
    }

    @keyframes orbFadeIn {

        opacity: 1;
      }

    .glow-pulse {

    /* ── Card shine on hover ── */

    .card-shine::before {
      content: '';

      top: -50%;

    .card-shine:hover::before {

    }

    .section-fade.visible {
